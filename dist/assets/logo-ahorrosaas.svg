<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="400" height="120" rx="12" fill="url(#grad)"/>

  <!-- Icono: moneda con % -->
  <circle cx="58" cy="60" r="34" fill="none" stroke="#22d3a5" stroke-width="3.5"/>
  <circle cx="58" cy="60" r="26" fill="#22d3a5" opacity="0.12"/>
  <text x="58" y="67" font-family="Arial, sans-serif" font-size="26" font-weight="800"
        text-anchor="middle" fill="#22d3a5">%</text>

  <!-- Texto principal -->
  <text x="106" y="52" font-family="'Arial Black', Arial, sans-serif" font-size="30"
        font-weight="900" fill="#ffffff" letter-spacing="-0.5">Ahorro</text>
  <text x="106" y="85" font-family="'Arial Black', Arial, sans-serif" font-size="30"
